<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Anna 💖</title>

<style>
body{
    margin:0;
    height:100vh;
    font-family:'Poppins',sans-serif;
    background: linear-gradient(135deg,#ee768e,#aaa5d2);
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
}

.card{
    background:white;
    padding:25px;
    border-radius:20px;
    width:300px;
    text-align:center;
    box-shadow:0 10px 30px rgba(0,0,0,0.2);
    animation:fade 0.6s ease;
}

@keyframes fade{
    from{opacity:0; transform:translateY(30px);}
    to{opacity:1; transform:translateY(0);}
}

button{
    margin-top:15px;
    padding:10px 20px;
    border:none;
    border-radius:20px;
    background:#ff4d88;
    color:white;
    cursor:pointer;
    transition:0.3s;
}

button:hover{ transform:scale(1.1); }

.btn{
    position:absolute;
    padding:10px 20px;
    border-radius:20px;
    cursor:pointer;
}

.yes{ background:#ff4d88; color:white; }
.no{ background:rgb(228, 110, 155); border:2px solid #ff4d88; }

.heart{
    position:absolute;
    color:#e20c0c;
    font-size:20px;
    animation:float 5s linear infinite;
}

@keyframes float{
    from{transform:translateY(100vh);}
    to{transform:translateY(-10vh);}
}

canvas{
    position:fixed;
    top:0;
    left:0;
    pointer-events:none;
}

img{
    width:200px;
    border-radius:15px;
    margin-top:15px;
}
</style>
</head>

<body>

<canvas id="fireworks"></canvas>
<div id="app"></div>

<script>

let name="";
let step=0;

let messages=[
"Hey Anna.... 💖",
"Romba Scene lam illa Enaku therija arivu vachu suma ory try nalla illanalum vera vali illa...💖💖",
"Ne enaku oru nalla bond anna ...! na feel pana tym la enaku suportive va kuda iruthuruka...💙",
"We have lot of sweet memories .movie ponathu ooru suthunathu... 🤍",
"Final ah oru kelvi 😏"
];

window.onload = function(){
showStart();
}

function showStart(){
document.getElementById("app").innerHTML=`
<div class="card">
<h3>🔐 Secret Access 💖</h3>

<input id="bond" placeholder="Bond ID"
style="padding:10px;border-radius:15px;border:none;margin-top:10px;"><br>

<input id="key" type="password" placeholder="Key to Explore"
style="padding:10px;border-radius:15px;border:none;margin-top:10px;"><br>

<button onclick="login()">Unlock 💖</button>
</div>
`;
}

function login(){
let bond=document.getElementById("bond").value;
let key=document.getElementById("key").value;

if(bond==="ANNA" && key==="Thangachii"){
name="Anna 💖";
createHearts();
showCard();
}else{
alert("Wrong Bond ID or Key 😒");
}
}

function showCard(){
if(step < messages.length){
document.getElementById("app").innerHTML=`
<div class="card">
<h3>${messages[step]}</h3>
<button onclick="next()">Next 👉</button>
</div>
`;
step++;
}else{
showQuestion();
}
}

function next(){
showCard();
}

function showQuestion(){
document.getElementById("app").innerHTML=`
<div style="text-align:center;">
<h2>${name}… will you stand with me in all my ups and downs? ✨ 💙</h2>
</div>

<button class="btn yes" onclick="yes()" style="top:60%;left:40%;">Yes 💖</button>
<button class="btn no" id="noBtn" style="top:60%;left:55%;">No 😏</button>
`;

moveNo();
}

function moveNo(){
let btn=document.getElementById("noBtn");

btn.onmouseover=function(){
let x=Math.random()*(window.innerWidth-100);
let y=Math.random()*(window.innerHeight-50);
btn.style.left=x+"px";
btn.style.top=y+"px";
};
}

function yes(){
document.getElementById("app").innerHTML=`
<div style="text-align:center;">
<h1>💖 ${name} u r my best one forever...! 💙🔥</h1>
<h2>Wish u many more happy bday anna....! 🎉</h2>

<img src="WhatsApp Image 2026-03-22 at 7.31.52 AM (2).jpeg">

<p style="margin-top:20px;">Stay happy always 😌💖</p>
</div>
`;
}

function createHearts(){
setInterval(()=>{
let heart=document.createElement("div");
heart.className="heart";
heart.innerHTML="💖";
heart.style.left=Math.random()*100+"vw";
heart.style.fontSize=(15+Math.random()*20)+"px";
document.body.appendChild(heart);

setTimeout(()=>heart.remove(),5000);
},300);
}

/* ❤️ HEART FIREWORKS START */
const canvas=document.getElementById("fireworks");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let particles=[];

function createFirework(){
let x=Math.random()*canvas.width;
let y=Math.random()*canvas.height/2;

for(let i=0;i<40;i++){
particles.push({
x:x,
y:y,
vx:(Math.random()-0.5)*5,
vy:(Math.random()-0.5)*5,
alpha:1,
size:Math.random()*8+6
});
}
}

function drawHeart(x, y, size, alpha){
ctx.save();
ctx.translate(x, y);
ctx.scale(size/10, size/10);

ctx.beginPath();
ctx.moveTo(0, 0);
ctx.bezierCurveTo(0, -3, -5, -3, -5, 0);
ctx.bezierCurveTo(-5, 3, 0, 5, 0, 7);
ctx.bezierCurveTo(0, 5, 5, 3, 5, 0);
ctx.bezierCurveTo(5, -3, 0, -3, 0, 0);

ctx.fillStyle=`rgba(255,0,100,${alpha})`;
ctx.fill();

ctx.restore();
}

function animateFireworks(){
ctx.clearRect(0,0,canvas.width,canvas.height);

particles.forEach((p,i)=>{
p.x+=p.vx;
p.y+=p.vy;
p.alpha-=0.01;

drawHeart(p.x, p.y, p.size, p.alpha);

if(p.alpha<=0) particles.splice(i,1);
});

requestAnimationFrame(animateFireworks);
}

setInterval(createFirework,800);
animateFireworks();
/* ❤️ HEART FIREWORKS END */

</script>

</body>
</html>
